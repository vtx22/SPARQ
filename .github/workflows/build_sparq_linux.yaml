name: SPARQ (Linux)

on:
  push:
    branches:
      - main
    paths:
      - 'CMakeLists.txt'
      - 'src/**'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ninja-build \
            build-essential \
            cmake \
            pkg-config \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libudev-dev \
            libgl1-mesa-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libflac-dev \
            libogg-dev \
            libvorbis-dev \
            libmbedtls-dev

      - name: Configure
        run: >
          cmake -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SPARQ_linux
          path: |
            build/src/SPARQ
            build/src/assets/**
            build/src/imgui.ini
            build/src/config.ini
            README.md
            FORMAT.md
            LICENSE
